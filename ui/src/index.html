<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
  /* ── Reset & base ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --arc-blue:    #00d4ff;
    --arc-glow:    rgba(0, 212, 255, 0.18);
    --arc-dim:     rgba(0, 212, 255, 0.08);
    --arc-border:  rgba(0, 212, 255, 0.25);
    --arc-strong:  rgba(0, 212, 255, 0.6);
    --warn:        #ff6b35;
    --ok:          #39ff6e;
    --bg:          #04080f;
    --bg2:         #070d18;
    --text:        #c8e8f0;
    --text-dim:    rgba(200, 232, 240, 0.4);
    --font-hud:    'Rajdhani', sans-serif;
    --font-mono:   'Share Tech Mono', monospace;
    --font-light:  'Exo 2', sans-serif;
    --radius:      4px;
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: var(--font-hud);
    color: var(--text);
    user-select: none;
  }

  /* ── App shell ────────────────────────────────────────────────── */
  #app {
    width: 420px;
    height: 780px;
    background: linear-gradient(160deg, #060c17 0%, #04080f 60%, #040b14 100%);
    border: 1px solid var(--arc-border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 40px rgba(0, 212, 255, 0.08),
      0 0 1px var(--arc-border) inset,
      0 32px 80px rgba(0,0,0,0.8);
  }

  /* ── Scanline overlay ─────────────────────────────────────────── */
  #app::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.012) 2px,
      rgba(0,212,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 100;
    border-radius: 12px;
  }

  /* ── Corner decorations ───────────────────────────────────────── */
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    z-index: 10;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--arc-blue);
  }
  .corner::before { width: 2px; height: 14px; }
  .corner::after  { width: 14px; height: 2px; }
  .corner.tl { top: 8px; left: 8px; }
  .corner.tl::before { top: 0; left: 0; }
  .corner.tl::after  { top: 0; left: 0; }
  .corner.tr { top: 8px; right: 8px; }
  .corner.tr::before { top: 0; right: 0; }
  .corner.tr::after  { top: 0; right: 0; }
  .corner.bl { bottom: 8px; left: 8px; }
  .corner.bl::before { bottom: 0; left: 0; }
  .corner.bl::after  { bottom: 0; left: 0; }
  .corner.br { bottom: 8px; right: 8px; }
  .corner.br::before { bottom: 0; right: 0; }
  .corner.br::after  { bottom: 0; right: 0; }

  /* ── Title bar (draggable) ────────────────────────────────────── */
  #titlebar {
    data-tauri-drag-region: true;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--arc-border);
    cursor: move;
    flex-shrink: 0;
    background: rgba(0,212,255,0.03);
  }
  #titlebar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .arc-reactor {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--arc-blue);
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .arc-reactor::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--arc-blue);
    box-shadow: 0 0 8px var(--arc-blue), 0 0 16px var(--arc-blue);
    animation: pulse-core 2s ease-in-out infinite;
  }
  @keyframes pulse-core {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.8); }
  }
  #title-text {
    font-family: var(--font-hud);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--arc-blue);
    text-shadow: 0 0 12px rgba(0,212,255,0.5);
  }
  #title-sub {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }
  #close-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(255,107,53,0.4);
    background: transparent;
    color: rgba(255,107,53,0.6);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.2s;
  }
  #close-btn:hover {
    background: rgba(255,107,53,0.15);
    border-color: var(--warn);
    color: var(--warn);
    box-shadow: 0 0 12px rgba(255,107,53,0.3);
  }

  /* ── Arc reactor visualiser ───────────────────────────────────── */
  #reactor-section {
    flex-shrink: 0;
    padding: 20px 0 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  #reactor-ring {
    position: relative;
    width: 140px; height: 140px;
  }

  #reactor-svg {
    width: 100%; height: 100%;
    animation: rotate-slow 12s linear infinite;
  }
  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  #reactor-inner {
    position: absolute;
    inset: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--arc-border);
    display: flex; align-items: center; justify-content: center;
  }

  #reactor-core {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%,
      rgba(0,212,255,0.35),
      rgba(0,100,180,0.2) 50%,
      transparent 80%
    );
    border: 1.5px solid var(--arc-strong);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  #reactor-core::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,212,255,0.2), transparent 70%);
    animation: core-breathe 3s ease-in-out infinite;
  }
  @keyframes core-breathe {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50%       { opacity: 1;   transform: scale(1.05); }
  }
  #reactor-core:hover {
    border-color: var(--arc-blue);
    box-shadow: 0 0 20px rgba(0,212,255,0.4), inset 0 0 20px rgba(0,212,255,0.1);
  }
  #reactor-icon {
    font-size: 22px;
    color: var(--arc-blue);
    text-shadow: 0 0 12px var(--arc-blue);
    z-index: 1;
    transition: transform 0.2s;
  }
  #reactor-core:hover #reactor-icon { transform: scale(1.1); }

  /* Status ring glow — changes with status */
  #reactor-svg circle.status-ring {
    transition: stroke 0.4s ease, filter 0.4s ease;
  }

  /* ── Status label ─────────────────────────────────────────────── */
  #status-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--arc-blue);
    box-shadow: 0 0 6px var(--arc-blue);
    transition: background 0.3s, box-shadow 0.3s;
  }
  #status-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    transition: color 0.3s;
  }

  /* ── HUD meters ───────────────────────────────────────────────── */
  #hud-meters {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .meter {
    flex: 1;
    background: var(--arc-dim);
    border: 1px solid var(--arc-border);
    border-radius: var(--radius);
    padding: 6px 8px;
  }
  .meter-label {
    font-family: var(--font-mono);
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .meter-bar {
    height: 3px;
    background: rgba(0,212,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    background: var(--arc-blue);
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 4px var(--arc-blue);
  }
  .meter-value {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--arc-blue);
    margin-top: 3px;
  }

  /* ── Conversation ─────────────────────────────────────────────── */
  #conversation {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  #conversation::-webkit-scrollbar { width: 3px; }
  #conversation::-webkit-scrollbar-track { background: transparent; }
  #conversation::-webkit-scrollbar-thumb { background: var(--arc-border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: msg-in 0.3s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .msg.user .msg-label { color: rgba(57,255,110,0.6); }
  .msg.assistant .msg-label { color: var(--arc-strong); }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: var(--radius);
    font-family: var(--font-hud);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.5;
    max-width: 90%;
  }
  .msg.user .msg-bubble {
    background: rgba(57,255,110,0.06);
    border: 1px solid rgba(57,255,110,0.2);
    color: #c8f0d0;
    align-self: flex-end;
  }
  .msg.assistant .msg-bubble {
    background: var(--arc-dim);
    border: 1px solid var(--arc-border);
    color: var(--text);
  }

  /* Thinking dots */
  .thinking-dots span {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--arc-blue);
    margin: 0 2px;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40%            { transform: scale(1.1); opacity: 1; }
  }

  /* ── Input area ───────────────────────────────────────────────── */
  #input-section {
    flex-shrink: 0;
    border-top: 1px solid var(--arc-border);
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(0,212,255,0.02);
  }

  #input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #text-input {
    flex: 1;
    background: rgba(0,212,255,0.05);
    border: 1px solid var(--arc-border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-family: var(--font-hud);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--arc-blue);
  }
  #text-input::placeholder { color: var(--text-dim); }
  #text-input:focus {
    border-color: var(--arc-strong);
    box-shadow: 0 0 12px rgba(0,212,255,0.12);
  }

  .btn {
    background: transparent;
    border: 1px solid var(--arc-border);
    border-radius: var(--radius);
    color: var(--arc-blue);
    cursor: pointer;
    font-family: var(--font-hud);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    padding: 9px 14px;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .btn:hover {
    background: var(--arc-dim);
    border-color: var(--arc-blue);
    box-shadow: 0 0 12px var(--arc-glow);
  }
  .btn:active { transform: scale(0.97); }
  .btn.danger {
    color: var(--warn);
    border-color: rgba(255,107,53,0.3);
  }
  .btn.danger:hover {
    background: rgba(255,107,53,0.08);
    border-color: var(--warn);
    box-shadow: 0 0 12px rgba(255,107,53,0.2);
  }

  #btn-mic {
    width: 38px; height: 38px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #clap-hint {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
  }

  /* ── Connection status ────────────────────────────────────────── */
  #conn-status {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 5px;
  }
  #conn-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  #conn-dot.online { background: var(--ok); box-shadow: 0 0 5px var(--ok); }

  /* ── Status-specific overrides ────────────────────────────────── */
  body.listening #status-dot {
    background: var(--ok);
    box-shadow: 0 0 8px var(--ok);
    animation: dot-pulse 0.8s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
  body.listening #status-label { color: var(--ok); }
  body.listening #reactor-core {
    border-color: var(--ok);
    box-shadow: 0 0 24px rgba(57,255,110,0.3);
  }

  body.thinking #status-dot { background: #ffd700; box-shadow: 0 0 8px #ffd700; }
  body.thinking #status-label { color: #ffd700; }

  body.speaking #status-dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  body.speaking #status-label { color: var(--warn); }
  body.speaking #reactor-svg { animation-duration: 3s; }

  /* ── Clap flash ───────────────────────────────────────────────── */
  @keyframes clap-flash {
    0%   { box-shadow: 0 0 0 0 rgba(0,212,255,0.6); }
    50%  { box-shadow: 0 0 0 24px rgba(0,212,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); }
  }
  .clap-flash #reactor-core {
    animation: clap-flash 0.6s ease-out, core-breathe 3s ease-in-out infinite 0.6s;
  }

  /* ── Audio wave (speaking indicator) ─────────────────────────── */
  #wave-bars {
    display: none;
    gap: 3px;
    align-items: center;
    height: 20px;
  }
  body.speaking #wave-bars,
  body.listening #wave-bars { display: flex; }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--arc-blue);
    animation: wave-anim 0.8s ease-in-out infinite;
  }
  body.listening .wave-bar { background: var(--ok); }
  .wave-bar:nth-child(1) { height: 8px;  animation-delay: 0s; }
  .wave-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { height: 20px; animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { height: 14px; animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { height: 8px;  animation-delay: 0.4s; }
  @keyframes wave-anim {
    0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
    50%       { transform: scaleY(1);   opacity: 1; }
  }
</style>
</head>
<body class="idle">

<div id="app">
  <!-- Corner decorations -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- Title bar -->
  <div id="titlebar" data-tauri-drag-region>
    <div id="titlebar-left">
      <div class="arc-reactor"></div>
      <div>
        <div id="title-text">JARVIS</div>
        <div id="title-sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
      </div>
    </div>
    <button id="close-btn" onclick="closeWindow()">✕</button>
  </div>

  <!-- Arc reactor visualiser -->
  <div id="reactor-section">
    <div id="reactor-ring">
      <svg id="reactor-svg" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer dashed ring -->
        <circle cx="70" cy="70" r="65" stroke="rgba(0,212,255,0.15)" stroke-width="1" stroke-dasharray="4 8"/>
        <!-- Rotating arc -->
        <circle class="status-ring" cx="70" cy="70" r="58"
          stroke="#00d4ff" stroke-width="1.5"
          stroke-dasharray="120 244"
          stroke-linecap="round"
          style="filter: drop-shadow(0 0 4px #00d4ff)"/>
        <!-- Second arc offset -->
        <circle cx="70" cy="70" r="58"
          stroke="rgba(0,212,255,0.25)" stroke-width="1"
          stroke-dasharray="60 304"
          stroke-dashoffset="180"
          stroke-linecap="round"/>
        <!-- Tick marks -->
        <g stroke="rgba(0,212,255,0.3)" stroke-width="1">
          <line x1="70" y1="5"   x2="70" y2="12"/>
          <line x1="70" y1="128" x2="70" y2="135"/>
          <line x1="5"   y1="70" x2="12"  y2="70"/>
          <line x1="128" y1="70" x2="135" y2="70"/>
        </g>
        <!-- Diagonal ticks -->
        <g stroke="rgba(0,212,255,0.15)" stroke-width="0.8">
          <line x1="26" y1="26" x2="31" y2="31"/>
          <line x1="114" y1="26" x2="109" y2="31"/>
          <line x1="26" y1="114" x2="31" y2="109"/>
          <line x1="114" y1="114" x2="109" y2="109"/>
        </g>
      </svg>

      <div id="reactor-inner">
        <div id="reactor-core" onclick="toggleListen()">
          <span id="reactor-icon">⬡</span>
        </div>
      </div>
    </div>

    <div id="status-row">
      <div id="wave-bars">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div id="status-dot"></div>
      <div id="status-label">STANDBY</div>
    </div>
  </div>

  <!-- HUD meters -->
  <div id="hud-meters">
    <div class="meter">
      <div class="meter-label">CPU</div>
      <div class="meter-bar"><div class="meter-fill" id="m-cpu" style="width:0%"></div></div>
      <div class="meter-value" id="m-cpu-v">—</div>
    </div>
    <div class="meter">
      <div class="meter-label">VRAM</div>
      <div class="meter-bar"><div class="meter-fill" id="m-vram" style="width:0%"></div></div>
      <div class="meter-value" id="m-vram-v">—</div>
    </div>
    <div class="meter">
      <div class="meter-label">MODEL</div>
      <div class="meter-bar"><div class="meter-fill" id="m-model" style="width:100%"></div></div>
      <div class="meter-value" id="m-model-v">LLAMA3</div>
    </div>
  </div>

  <!-- Conversation -->
  <div id="conversation"></div>

  <!-- Input -->
  <div id="input-section">
    <div id="input-row">
      <button class="btn" id="btn-mic" onclick="toggleListen()" title="Click to speak (or double-clap)">🎙</button>
      <input id="text-input" type="text" placeholder="Type a command, Sir..."
             onkeydown="if(event.key==='Enter') sendText()">
      <button class="btn" onclick="sendText()">SEND</button>
    </div>
    <div id="bottom-row">
      <span id="clap-hint">👏👏 DOUBLE CLAP TO ACTIVATE</span>
      <div id="conn-status">
        <div id="conn-dot"></div>
        <span id="conn-label">OFFLINE</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── WebSocket connection ──────────────────────────────────────────────────────
const WS_URL = 'ws://localhost:8765';
let ws = null;
let reconnectTimer = null;
let currentStatus = 'idle';
let thinkingMsg = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setConnected(true);
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleServerMessage(msg);
  };

  ws.onclose = () => {
    setConnected(false);
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

function setConnected(online) {
  document.getElementById('conn-dot').className = online ? 'online' : '';
  document.getElementById('conn-label').textContent = online ? 'ONLINE' : 'OFFLINE';
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

// ── Server message handling ───────────────────────────────────────────────────
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'state':
      applyFullState(msg.data);
      break;
    case 'status':
      setStatus(msg.status);
      break;
    case 'transcript':
      removeThinking();
      addMessage('user', msg.text);
      addThinking();
      break;
    case 'response':
      removeThinking();
      addMessage('assistant', msg.text);
      break;
    case 'clap_detected':
      flashClap();
      break;
    case 'history_cleared':
      document.getElementById('conversation').innerHTML = '';
      break;
  }
}

function applyFullState(data) {
  setStatus(data.status || 'idle');
  const conv = document.getElementById('conversation');
  conv.innerHTML = '';
  (data.history || []).forEach(h => addMessage(h.role, h.content, false));
}

// ── Status management ─────────────────────────────────────────────────────────
const STATUS_LABELS = {
  idle:      'STANDBY',
  listening: 'LISTENING',
  thinking:  'PROCESSING',
  speaking:  'RESPONDING',
};
const STATUS_ICONS = {
  idle:      '⬡',
  listening: '◎',
  thinking:  '◈',
  speaking:  '◉',
};

function setStatus(s) {
  currentStatus = s;
  document.body.className = s;
  document.getElementById('status-label').textContent = STATUS_LABELS[s] || s.toUpperCase();
  document.getElementById('reactor-icon').textContent = STATUS_ICONS[s] || '⬡';

  if (s === 'thinking') addThinking();
  else if (s !== 'listening') removeThinking();
}

// ── Conversation helpers ──────────────────────────────────────────────────────
function addMessage(role, text, scroll = true) {
  const conv = document.getElementById('conversation');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? '[ YOU ]' : '[ JARVIS ]'}</div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  conv.appendChild(div);
  if (scroll) conv.scrollTop = conv.scrollHeight;
}

function addThinking() {
  if (thinkingMsg) return;
  const conv = document.getElementById('conversation');
  thinkingMsg = document.createElement('div');
  thinkingMsg.className = 'msg assistant';
  thinkingMsg.innerHTML = `
    <div class="msg-label">[ JARVIS ]</div>
    <div class="msg-bubble">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
    </div>
  `;
  conv.appendChild(thinkingMsg);
  conv.scrollTop = conv.scrollHeight;
}

function removeThinking() {
  if (thinkingMsg) {
    thinkingMsg.remove();
    thinkingMsg = null;
  }
}

function flashClap() {
  const section = document.getElementById('reactor-section');
  section.classList.add('clap-flash');
  setTimeout(() => section.classList.remove('clap-flash'), 700);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggleListen() {
  send({ type: 'toggle_listen' });
}

function sendText() {
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMessage('user', text);
  addThinking();
  send({ type: 'send_text', text });
}

function closeWindow() {
  if (window.__TAURI__) {
    window.__TAURI__.window.getCurrent().close();
  } else {
    window.close();
  }
}

// ── Simulated HUD meters (real values need native bridge) ─────────────────────
function updateMeters() {
  // CPU: random walk simulation (replace with real tauri command later)
  const cpu = Math.round(15 + Math.random() * 40);
  document.getElementById('m-cpu').style.width = cpu + '%';
  document.getElementById('m-cpu-v').textContent = cpu + '%';

  const vram = Math.round(60 + Math.random() * 20);
  document.getElementById('m-vram').style.width = vram + '%';
  document.getElementById('m-vram-v').textContent = vram + '%';
}
setInterval(updateMeters, 2000);
updateMeters();

// ── Boot ──────────────────────────────────────────────────────────────────────
connect();

// Boot message
setTimeout(() => {
  addMessage('assistant', 'Good day, Sir. All systems are online. How may I assist you?');
}, 800);
</script>
